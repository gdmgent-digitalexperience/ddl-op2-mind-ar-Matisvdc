<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDL OP 2 - MIND AR Matis Vandecappelle Face</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-face-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene
      mindar-face
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera active="false" position="0 0 0"></a-camera>

      <a-assets>
        <a-asset-item     id="glassesModel"
        src="./Assets/pink_round_sunglasses.glb" ><a-assets-item>
          <a-asset-item     id="mask"
          src="./Assets/face_mask.glb" ><a-assets-item>
      </a-assets>
        <a-entity mindar-face-target="anchorIndex: 5">
          <a-gltf-model     rotation="0 0 0"
          position="0 0 -0.25"
          scale="0.9 0.9 0.9"
          src="#glassesModel"></a-gltf-model>


            <a-entity mindar-face-target="anchorIndex: 5">
              <a-gltf-model     rotation="0 0 0"
              position="0 0 10"
              scale="3 3 3"
              src="#mask"></a-gltf-model>

      </a-entity>
    </a-scene>
  </body>
</html>
